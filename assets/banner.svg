<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lucas Lima - Front-end Developer</title>
  <desc id="desc">Premium GitHub profile banner with neon green accents for Lucas Lima, focused on front-end development.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#090C10"/>
    </linearGradient>

    <radialGradient id="glowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 95) rotate(136) scale(420 300)">
      <stop stop-color="#4CFF33" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4CFF33" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 70) rotate(45) scale(260 220)">
      <stop stop-color="#4CFF33" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#4CFF33" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGradient" x1="80" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4CFF33" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#4CFF33" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#4CFF33" stop-opacity="1"/>
      <stop offset="0.82" stop-color="#4CFF33" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#4CFF33" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#4CFF33" stroke-width="0.7" opacity="0.10"/>
    </pattern>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="0" fill="url(#bgGradient)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <rect width="1280" height="420" fill="url(#glowTop)"/>
  <rect width="1280" height="420" fill="url(#glowLeft)"/>

  <circle cx="1110" cy="85" r="3.5" fill="#4CFF33" opacity="0.95"/>
  <circle cx="1142" cy="112" r="2.5" fill="#4CFF33" opacity="0.55"/>
  <circle cx="1082" cy="130" r="2" fill="#4CFF33" opacity="0.4"/>

  <rect x="72" y="58" width="690" height="292" rx="28" fill="#10161D" stroke="#4CFF33" stroke-opacity="0.22" filter="url(#cardShadow)"/>

  <rect x="98" y="84" width="14" height="14" rx="7" fill="#4CFF33" opacity="0.95"/>
  <rect x="122" y="84" width="14" height="14" rx="7" fill="#4CFF33" opacity="0.55"/>
  <rect x="146" y="84" width="14" height="14" rx="7" fill="#4CFF33" opacity="0.25"/>

  <text x="98" y="154" fill="#E6EDF3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.2">
    Lucas Lima
  </text>

  <text x="98" y="204" fill="#4CFF33" font-family="Fira Code, Consolas, monospace" font-size="24" font-weight="600">
    Front-end Developer
  </text>

  <text x="98" y="248" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">
    Building clean, modern and responsive web experiences
  </text>

  <text x="98" y="280" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
    React • Next.js • TypeScript • UI Engineering
  </text>

  <text x="98" y="314" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">
    Product mindset • Agile background • Front-end focus
  </text>

  <g filter="url(#cardShadow)">
    <rect x="835" y="86" width="365" height="232" rx="24" fill="#0F141B" stroke="#4CFF33" stroke-opacity="0.24"/>
    
    <text x="866" y="128" fill="#4CFF33" font-family="Fira Code, Consolas, monospace" font-size="18" font-weight="600">
      const developer = {
    </text>
    
    <text x="890" y="164" fill="#E6EDF3" font-family="Fira Code, Consolas, monospace" font-size="17">
      role: "Front-end",
    </text>
    <text x="890" y="194" fill="#E6EDF3" font-family="Fira Code, Consolas, monospace" font-size="15">
  stack: ["React", "Next", "TS"],
</text>
    <text x="890" y="224" fill="#E6EDF3" font-family="Fira Code, Consolas, monospace" font-size="17">
      focus: "UI + Product Thinking",
    </text>
    <text x="890" y="254" fill="#E6EDF3" font-family="Fira Code, Consolas, monospace" font-size="15">
      mindset: "Build • Improve • Deliver"
    </text>
    
    <text x="866" y="292" fill="#4CFF33" font-family="Fira Code, Consolas, monospace" font-size="18" font-weight="600">
      }
    </text>
  </g>

  <path d="M90 372 H1190" stroke="url(#lineGradient)" stroke-width="2" filter="url(#softGlow)"/>
</svg>
