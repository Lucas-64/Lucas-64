<svg width="600" height="320" viewBox="0 0 600 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Personal Portfolio</title>
  <desc id="desc">Project card for Lucas Lima personal portfolio website built with HTML, CSS and JavaScript.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#090C10"/>
    </linearGradient>

```
<radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(455 70) rotate(135) scale(300 240)">
  <stop stop-color="#4CFF33" stop-opacity="0.24"/>
  <stop offset="1" stop-color="#4CFF33" stop-opacity="0"/>
</radialGradient>

<pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
  <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#4CFF33" stroke-width="0.6" opacity="0.10"/>
</pattern>

<filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="5" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
```

