<svg width="600" height="320" viewBox="0 0 600 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Documentation Generator</title>
  <desc id="desc">Project card for a local-first AI documentation generator focused on project management, automation and privacy.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#090C10"/>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(470 70) rotate(135) scale(260 220)">
      <stop stop-color="#4CFF33" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#4CFF33" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#4CFF33" stroke-width="0.6" opacity="0.10"/>
    </pattern>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="320" rx="24" fill="url(#bg)"/>
  <rect width="600" height="320" rx="24" fill="url(#grid)"/>
  <rect width="600" height="320" rx="24" fill="url(#glow)"/>
  <rect x="1" y="1" width="598" height="318" rx="23" stroke="#4CFF33" stroke-opacity="0.35"/>

  <circle cx="510" cy="62" r="40" fill="#4CFF33" opacity="0.12" filter="url(#softGlow)"/>

  <!-- document icon -->
  <rect x="488" y="42" width="44" height="54" rx="6" stroke="#4CFF33" stroke-width="3"/>
  <path d="M498 58H522" stroke="#4CFF33" stroke-width="3" stroke-linecap="round"/>
  <path d="M498 69H522" stroke="#4CFF33" stroke-width="3" stroke-linecap="round"/>
  <path d="M498 80H516" stroke="#4CFF33" stroke-width="3" stroke-linecap="round"/>
  <circle cx="536" cy="44" r="7" fill="#4CFF33" opacity="0.95" filter="url(#softGlow)"/>

  <text x="42" y="70" fill="#4CFF33" font-family="Fira Code, Consolas, monospace" font-size="16" font-weight="600">
    LOCAL AI LAB
  </text>

  <text x="42" y="122" fill="#E6EDF3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">
    AI Documentation
  </text>

  <text x="42" y="160" fill="#E6EDF3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">
    Generator
  </text>

  <text x="42" y="198" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
    Local-first workflow for generating project
  </text>

  <text x="42" y="224" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">
    documents with AI, templates and automation.
  </text>

  <!-- tags -->
  <rect x="42" y="252" width="86" height="34" rx="17" fill="#4CFF33" fill-opacity="0.12" stroke="#4CFF33" stroke-opacity="0.4"/>
  <text x="64" y="274" fill="#4CFF33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Python
  </text>

  <rect x="140" y="252" width="104" height="34" rx="17" fill="#4CFF33" fill-opacity="0.12" stroke="#4CFF33" stroke-opacity="0.4"/>
  <text x="162" y="274" fill="#4CFF33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Local LLM
  </text>

  <rect x="256" y="252" width="122" height="34" rx="17" fill="#4CFF33" fill-opacity="0.12" stroke="#4CFF33" stroke-opacity="0.4"/>
  <text x="278" y="274" fill="#4CFF33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Automation
  </text>

  <path d="M42 302H558" stroke="#4CFF33" stroke-opacity="0.55" stroke-width="2" filter="url(#softGlow)"/>
</svg>
